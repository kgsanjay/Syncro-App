<!DOCTYPE html>
<html lang="en">
<head>

    <title>Secure Login | Syncro Enterprise</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        theme: 'var(--theme)', theme2: 'var(--theme2)', header: 'var(--header)',
                        text: 'var(--text)', light: 'var(--light)', border: 'var(--border)', white: 'var(--white)',

    <style>
        :root { --theme: #FFC107; --theme2: #003366; --header: #002244; --text: #555555; --light: #f8f9fa; --border: #eef1f6; --white: #ffffff; }
        html { scroll-behavior: smooth; }
        body { background-color: var(--light); color: var(--text); -webkit-font-smoothing: antialiased; }
    </style>
</head>
<body class="bg-[var(--light)] antialiased selection:bg-[var(--theme)] selection:text-[var(--header)]">
    
    
<div class="flex items-center justify-center w-full px-6 min-h-[calc(100vh-6rem)] relative overflow-hidden">
    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-1/4 -right-1/4 w-[600px] h-[600px] bg-[var(--theme2)]/5 rounded-full blur-[120px] animate-pulse"></div>
        <div class="absolute -bottom-1/4 -left-1/4 w-[600px] h-[600px] bg-[var(--theme)]/10 rounded-full blur-[120px] opacity-40"></div>

            <h1 class="text-4xl font-black tracking-tighter mb-4 relative z-10">
                <span class="text-[var(--white)]">SYNCRO</span><span class="text-[var(--theme)]">.</span>
            </h1>
            <p class="text-[9px] font-black uppercase tracking-[0.4em] text-[var(--white)]/40 relative z-10 flex items-center justify-center gap-3">
                <span class="w-8 h-px bg-[var(--white)]/20"></span>
                SOVEREIGN COMMAND
                <span class="w-8 h-px bg-[var(--white)]/20"></span>
            </p>
        </div>

        <div class="p-12 sm:p-14">
            
            <form action="/syncro/login" method="POST" class="space-y-8 m-0">
                <input type="hidden" name="csrf_token" value="c2c365333bbe658a25d00e9d5de7a8a5d0fc70777029b7b34d24aa392762d753">

                <div class="space-y-3">
                    <label for="email" class="block text-[9px] font-black text-[var(--header)] uppercase tracking-[0.3em] opacity-40 ml-1">Universal Credential</label>
                    <input type="email" id="email" name="email" required autocomplete="email" placeholder="admin@hotel.com"

                </div>

                <div class="space-y-3">
                    <label for="password" class="block text-[9px] font-black text-[var(--header)] uppercase tracking-[0.3em] opacity-40 ml-1">Signature Sequence</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••"
                        class="w-full px-7 py-5 rounded-2xl border-2 border-[var(--border)] bg-[var(--light)] text-[var(--header)] focus:outline-none focus:border-[var(--theme2)] focus:bg-[var(--white)] transition-all font-mono shadow-inner tracking-widest text-lg">
                </div>

                <button type="submit" 
                    class="w-full flex justify-center items-center py-5 px-6 rounded-2xl shadow-2xl text-[11px] font-black text-[var(--white)] bg-[var(--header)] hover:bg-[var(--theme2)] transition-all uppercase tracking-[0.4em] mt-10 active:scale-95 group/btn transform hover:-translate-y-1">
                    <svg class="w-5 h-5 mr-4 group-hover:rotate-12 transition-transform opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>

            <div class="mt-12 pt-8 border-t-2 border-[var(--border)]/50 text-center">
                <p class="text-[9px] font-black text-[var(--text)] uppercase tracking-[0.4em] opacity-20">&copy; 2026 Syncro PMS Infrastructure.</p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
