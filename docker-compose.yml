version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: syncro_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
    networks:
      - syncro_net

  web:
    image: nginx:alpine
    container_name: syncro_web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - syncro_net

  db:
    image: mysql:8.0
    container_name: syncro_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: syncro_db
      MYSQL_ROOT_PASSWORD: syncro_root_pass
      MYSQL_USER: syncro_user
      MYSQL_PASSWORD: syncro_password
    volumes:
      - syncro_db_data:/var/lib/mysql
    networks:
      - syncro_net

  redis:
    image: redis:alpine
    container_name: syncro_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - syncro_redis_data:/data
    networks:
      - syncro_net

networks:
  syncro_net:
    driver: bridge

volumes:
  syncro_db_data:
  syncro_redis_data:
