name: Deploy via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v4
      
    - name: Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ftp.stackcp.adhyancreatives.in
        username: syncro@syncro.adhyancreatives.in
        password: xuegmut3y
        protocol: ftps
        exclude: |
          **/.git*
          **/.git*/**
          **/.github*/**
